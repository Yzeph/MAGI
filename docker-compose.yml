version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magi_backend
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      # 这里可以添加其他的环境变量，或将 .env 文件映射进去
      # - PORT=3000
    volumes:
      - ./backend/magi.db:/app/magi.db # 挂载本地数据库文件，持久化数据
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: magi_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
