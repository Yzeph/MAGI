server {
    listen 80;
    server_name localhost;

    # 设置默认字符集（Vue的 HTML 通常自带）
    charset utf-8;

    # 前端网页核心分发，解决 history 模式路由下的 404 以及资源获取
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理，将 /api 转给 docker 内网的 backend 服务
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_add_x_forwarded_for;
    }

    # 反向代理，将 /ws 转给 docker 内网的 backend WebSocket 服务 
    location /ws {
        proxy_pass http://backend:3001; # 注意 config.js 里默认 websocket 是这个端口
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400; # 维持长连接
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 防止未授权的静态配置遍历
    location ~ /\.ht {
        deny all;
    }
}